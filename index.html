<!-- ✅ إصلاح ظهور المنتجات في الهاتف + إدارة المنتجات -->
<style>
  body {
    overflow-x: hidden;
  }

  #reem-products-section {
    direction: rtl;
    padding: 45px 18px;
    background: #fff7fb;
    font-family: inherit;
  }

  #reem-products-section .reem-products-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 22px;
  }

  #reem-products-section h2 {
    margin: 0;
    font-size: 34px;
    color: #241722;
    font-weight: 900;
  }

  #reem-products-section .reem-small-title {
    color: #a05779;
    font-weight: 800;
    margin-bottom: 5px;
  }

  #reem-admin-login-btn,
  #reem-add-product-btn {
    border: none;
    background: #9b4f72;
    color: white;
    padding: 11px 16px;
    border-radius: 999px;
    font-weight: 800;
    cursor: pointer;
  }

  #reem-add-product-btn {
    display: none;
    background: #2f7d48;
  }

  #reem-products-grid {
    display: grid !important;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    width: 100%;
    height: auto !important;
    overflow: visible !important;
    visibility: visible !important;
    opacity: 1 !important;
  }

  .reem-product-card {
    display: block !important;
    background: white;
    border-radius: 28px;
    padding: 16px;
    box-shadow: 0 12px 35px rgba(74, 36, 58, 0.10);
    border: 1px solid rgba(160, 87, 121, 0.15);
    visibility: visible !important;
    opacity: 1 !important;
  }

  .reem-product-img {
    width: 100%;
    height: 170px;
    border-radius: 22px;
    background: #f3e8ef;
    object-fit: cover;
    display: block;
  }

  .reem-product-card h3 {
    margin: 13px 0 6px;
    color: #241722;
    font-size: 20px;
    font-weight: 900;
  }

  .reem-product-card p {
    margin: 0 0 10px;
    color: #8c7c86;
    font-size: 14px;
    line-height: 1.7;
  }

  .reem-price {
    color: #9b4f72;
    font-weight: 900;
    font-size: 18px;
    margin-bottom: 12px;
  }

  .reem-card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .reem-order-btn,
  .reem-edit-btn,
  .reem-delete-btn {
    flex: 1;
    border: none;
    border-radius: 16px;
    padding: 10px;
    font-weight: 800;
    cursor: pointer;
  }

  .reem-order-btn {
    background: #9b4f72;
    color: white;
  }

  .reem-edit-btn {
    display: none;
    background: #e7d2dc;
    color: #4b2638;
  }

  .reem-delete-btn {
    display: none;
    background: #ffe1e1;
    color: #a52424;
  }

  body.reem-admin-mode .reem-edit-btn,
  body.reem-admin-mode .reem-delete-btn,
  body.reem-admin-mode #reem-add-product-btn {
    display: inline-block;
  }

  @media (max-width: 768px) {
    #reem-products-section {
      padding: 35px 14px;
    }

    #reem-products-section .reem-products-head {
      align-items: flex-start;
      flex-direction: column;
    }

    #reem-products-section h2 {
      font-size: 30px;
    }

    #reem-products-grid {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
    }

    .reem-product-img {
      height: 190px;
    }
  }
</style>

<section id="reem-products-section">
  <div class="reem-products-head">
    <div>
      <div class="reem-small-title">منتجات مختارة</div>
      <h2>منتجات المتجر</h2>
    </div>

    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button id="reem-admin-login-btn">حسابي</button>
      <button id="reem-add-product-btn">+ إضافة منتج</button>
    </div>
  </div>

  <div id="reem-products-grid"></div>
</section>

<script>
(function () {
  const ADMIN_EMAIL = "Client@gmail.com";
  const ADMIN_CODE = "1234";
  const WHATSAPP_NUMBER = "22237929637";

  const STORAGE_KEY = "reem_beauty_products_v1";

  const defaultProducts = [
    {
      id: Date.now() + 1,
      name: "فلتر زواج",
      price: "حسب الطلب",
      desc: "فلتر جميل ومناسب للمناسبات.",
      img: "https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: Date.now() + 2,
      name: "فلتر خطوبة",
      price: "حسب الطلب",
      desc: "تصميم أنيق بألوان ناعمة.",
      img: "https://images.unsplash.com/photo-1523438885200-e635ba2c371e?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: Date.now() + 3,
      name: "فلتر تخرج",
      price: "حسب الطلب",
      desc: "فلتر احترافي لحفلات التخرج.",
      img: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: Date.now() + 4,
      name: "فلتر عقد زواج",
      price: "حسب الطلب",
      desc: "تصميم راقٍ ومناسب للتوثيق والمشاركة.",
      img: "https://images.unsplash.com/photo-1494955870715-979ca4f13bf0?auto=format&fit=crop&w=800&q=80"
    }
  ];

  function getProducts() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultProducts));
      return defaultProducts;
    }

    try {
      return JSON.parse(saved);
    } catch (e) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultProducts));
      return defaultProducts;
    }
  }

  function saveProducts(products) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
  }

  function renderProducts() {
    const grid = document.getElementById("reem-products-grid");
    const products = getProducts();

    if (!products.length) {
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:35px;color:#9b4f72;font-weight:800;">
          لا توجد منتجات حالياً
        </div>
      `;
      return;
    }

    grid.innerHTML = products.map(product => `
      <div class="reem-product-card">
        <img class="reem-product-img" src="${product.img || ''}" onerror="this.src='https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=800&q=80'">
        <h3>${product.name}</h3>
        <p>${product.desc || ''}</p>
        <div class="reem-price">${product.price || 'حسب الطلب'}</div>

        <div class="reem-card-actions">
          <button class="reem-order-btn" onclick="reemOrderProduct('${product.name}')">طلب واتساب</button>
          <button class="reem-edit-btn" onclick="reemEditProduct(${product.id})">تعديل</button>
          <button class="reem-delete-btn" onclick="reemDeleteProduct(${product.id})">حذف</button>
        </div>
      </div>
    `).join("");
  }

  window.reemOrderProduct = function (name) {
    const text = encodeURIComponent("السلام عليكم، أريد طلب: " + name);
    window.open("https://wa.me/" + WHATSAPP_NUMBER + "?text=" + text, "_blank");
  };

  window.reemEditProduct = function (id) {
    const products = getProducts();
    const product = products.find(p => p.id === id);
    if (!product) return;

    const name = prompt("اسم المنتج:", product.name);
    if (name === null) return;

    const price = prompt("السعر:", product.price);
    if (price === null) return;

    const desc = prompt("الوصف:", product.desc);
    if (desc === null) return;

    const img = prompt("رابط الصورة:", product.img);
    if (img === null) return;

    product.name = name.trim();
    product.price = price.trim();
    product.desc = desc.trim();
    product.img = img.trim();

    saveProducts(products);
    renderProducts();
  };

  window.reemDeleteProduct = function (id) {
    if (!confirm("هل تريد حذف هذا المنتج؟")) return;

    const products = getProducts().filter(p => p.id !== id);
    saveProducts(products);
    renderProducts();
  };

  document.getElementById("reem-admin-login-btn").addEventListener("click", function () {
    if (document.body.classList.contains("reem-admin-mode")) {
      document.body.classList.remove("reem-admin-mode");
      this.textContent = "حسابي";
      return;
    }

    const email = prompt("أدخل الإيميل:");
    const code = prompt("أدخل الكود:");

    if (email === ADMIN_EMAIL && code === ADMIN_CODE) {
      document.body.classList.add("reem-admin-mode");
      this.textContent = "خروج";
      alert("تم الدخول إلى حساب المدير");
    } else {
      alert("الإيميل أو الكود غير صحيح");
    }
  });

  document.getElementById("reem-add-product-btn").addEventListener("click", function () {
    const name = prompt("اسم المنتج:");
    if (!name) return;

    const price = prompt("السعر:", "حسب الطلب");
    if (price === null) return;

    const desc = prompt("الوصف:", "منتج جديد من المتجر");
    if (desc === null) return;

    const img = prompt("رابط الصورة:");
    if (img === null) return;

    const products = getProducts();

    products.unshift({
      id: Date.now(),
      name: name.trim(),
      price: price.trim(),
      desc: desc.trim(),
      img: img.trim()
    });

    saveProducts(products);
    renderProducts();
  });

  renderProducts();
})();
</script>
